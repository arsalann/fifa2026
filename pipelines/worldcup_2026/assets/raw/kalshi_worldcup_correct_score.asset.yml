name: raw.kalshi_worldcup_correct_score
type: python
run: kalshi_worldcup_correct_score.py
image: python:3.13
connection: motherduck-fifa
description: Open Kalshi World Cup correct-score events with nested match score markets.

materialization:
  type: table
  strategy: create+replace

columns:
  - name: event_ticker
    type: varchar
    primary_key: true
  - name: series_ticker
    type: varchar
  - name: sub_title
    type: varchar
  - name: title
    type: varchar
  - name: category
    type: varchar
  - name: strike_date
    type: timestamp
  - name: strike_period
    type: varchar
  - name: created_time
    type: timestamp
  - name: updated_time
    type: timestamp
  - name: markets
    type: json
  - name: raw
    type: json
